<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日記共有アプリ | ダッシュボード</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="dashboard">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Diary Share</p>
          <h1>日記ダッシュボード</h1>
          <p class="lead">カレンダーで日付と書き込んだ時刻をチェックできます。</p>
        </div>
        <button id="todayBtn" class="ghost-btn" type="button">今日に戻る</button>
      </header>

      <section class="calendar-panel" aria-label="日記カレンダー">
        <div class="calendar-topbar">
          <button id="prevBtn" class="nav-btn" type="button" aria-label="前月">◀</button>
          <h2 id="monthLabel" aria-live="polite"></h2>
          <button id="nextBtn" class="nav-btn" type="button" aria-label="次月">▶</button>
        </div>
        <div class="weekday-row" aria-hidden="true">
          <span>日</span>
          <span>月</span>
          <span>火</span>
          <span>水</span>
          <span>木</span>
          <span>金</span>
          <span>土</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <aside class="detail-panel" aria-label="選択日の詳細">
        <h3 id="selectedDateLabel">日付を選択してください</h3>
        <p class="detail-subtitle">この日の書き込み時刻</p>
        <ul id="timeList" class="time-list"></ul>

        <h3 class="share-title">共有できる人</h3>
        <p class="detail-subtitle">この日記を共有できるメンバー一覧</p>
        <ul id="sharePersonList" class="share-person-list"></ul>
      </aside>
    </main>

    <script src="./dashboard.js"></script>
  </body>
</html>
